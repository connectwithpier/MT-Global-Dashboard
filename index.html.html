<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT Global Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--blue50:#E6F1FB;--blue400:#378ADD;--blue800:#0C447C;--teal50:#E1F5EE;--teal400:#1D9E75;--teal800:#085041;--red50:#FCEBEB;--red400:#E24B4A;--red800:#791F1F;--amber50:#FAEEDA;--amber400:#BA7517;--amber800:#633806;--purple50:#EEEDFE;--purple400:#7F77DD;--purple800:#3C3489;--radius:8px;--radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--text:#f0ede8;--text2:#b4b2a9;--text3:#73726c;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);--blue400:#85B7EB;--teal400:#5DCAA5;--red400:#F09595;--amber400:#EF9F27;--purple400:#AFA9EC}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{max-width:1160px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:16px}
.header h1{font-size:20px;font-weight:500}
.header p{font-size:13px;color:var(--text2);margin-top:3px}
.upload-row{display:flex;gap:10px;flex-wrap:wrap}
label.upload-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;white-space:nowrap}
label.upload-btn:hover{background:var(--bg2)}
.badge{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}
.badge-kpi{background:var(--blue50);color:var(--blue800)}
.badge-ref{background:var(--teal50);color:var(--teal800)}
input[type=file]{display:none}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;padding:12px 16px;background:var(--bg2);border-radius:var(--radius-lg);border:0.5px solid var(--border)}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-label{font-size:12px;color:var(--text2);white-space:nowrap}
.filter-select{padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer}
.filter-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.agent-filter-wrap{display:flex;gap:6px;flex-wrap:wrap}
.agent-pill{padding:4px 11px;border:0.5px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text2);cursor:pointer;font-size:12px;white-space:nowrap}
.agent-pill.active{color:#fff;border-color:transparent}
.agent-pill.manager{border-style:dashed}
.storage-note{font-size:11px;color:var(--text3);margin-left:auto}

/* Sections */
.section{margin-bottom:32px}
.section-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.good{color:var(--teal400)}.warn{color:var(--amber400)}.bad{color:var(--red400)}

/* Highlights */
.highlights{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.highlight-card{border-radius:var(--radius-lg);padding:16px 18px;border:0.5px solid var(--border);background:var(--bg)}
.hl-icon{font-size:18px;margin-bottom:8px}
.hl-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:4px}
.hl-name{font-size:18px;font-weight:500;margin-bottom:2px}
.hl-stat{font-size:12px;color:var(--text2)}
.hl-best{border-color:var(--amber400);background:var(--amber50)}
.hl-best .hl-label{color:var(--amber800)}
.hl-best .hl-name{color:var(--amber800)}
.hl-csat{border-color:var(--blue400);background:var(--blue50)}
.hl-csat .hl-label{color:var(--blue800)}
.hl-csat .hl-name{color:var(--blue800)}
.hl-refund{border-color:var(--teal400);background:var(--teal50)}
.hl-refund .hl-label{color:var(--teal800)}
.hl-refund .hl-name{color:var(--teal800)}
.hl-speed{border-color:var(--purple400);background:var(--purple50)}
.hl-speed .hl-label{color:var(--purple800)}
.hl-speed .hl-name{color:var(--purple800)}
@media(prefers-color-scheme:dark){
  .hl-best{background:#412402;border-color:var(--amber400)}
  .hl-best .hl-label,.hl-best .hl-name{color:#FAC775}
  .hl-csat{background:#042C53;border-color:var(--blue400)}
  .hl-csat .hl-label,.hl-csat .hl-name{color:#B5D4F4}
  .hl-refund{background:#04342C;border-color:var(--teal400)}
  .hl-refund .hl-label,.hl-refund .hl-name{color:#9FE1CB}
  .hl-speed{background:#26215C;border-color:var(--purple400)}
  .hl-speed .hl-label,.hl-speed .hl-name{color:#CECBF6}
}

.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-weight:500;font-size:12px;color:var(--text2);border-bottom:0.5px solid var(--border);background:var(--bg2)}
td{padding:10px 14px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
tr.manager-row td{opacity:0.7}
tr.manager-row td:first-child::after{content:' (mgr)';font-size:10px;color:var(--text3)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar{height:6px;border-radius:3px;background:var(--blue400)}
.bar.teal{background:var(--teal400)}
.star{width:10px;height:10px;border-radius:1px;display:inline-block}
.star.fill{background:var(--amber400)}
.star.empty{background:var(--bg3)}
.star-row{display:flex;gap:2px}
.chip{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:500}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.chart-wrap{padding:16px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.ldot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
.empty-state{padding:48px 20px;text-align:center;color:var(--text3);font-size:13px}
.empty-state svg{display:block;margin:0 auto 12px;opacity:0.35}

/* Month picker modal */
.modal-overlay{position:absolute;top:0;left:0;width:100%;min-height:300px;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;border-radius:var(--radius-lg);z-index:10}
.modal{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:340px;max-width:90%}
.modal h3{font-size:15px;font-weight:500;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px}
.modal-months{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.mpick{padding:7px 14px;border:0.5px solid var(--border2);border-radius:20px;background:var(--bg);color:var(--text);cursor:pointer;font-size:13px}
.mpick:hover,.mpick.sel{background:var(--blue400);color:#fff;border-color:var(--blue400)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.btn-confirm{padding:8px 18px;border:none;border-radius:var(--radius);background:var(--blue400);color:#fff;cursor:pointer;font-size:13px}
.btn-cancel{padding:8px 18px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text2);cursor:pointer;font-size:13px}
.modal-wrap{position:relative;min-height:200px}

/* Stored months list */
.stored-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.stored-chip{padding:4px 12px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px}
.stored-chip:hover{background:var(--bg2)}
.stored-chip .x{font-size:14px;color:var(--text3);line-height:1}
.stored-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stored-header span{font-size:12px;color:var(--text2)}
.clear-all{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;padding:0}
.clear-all:hover{color:var(--red400)}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div>
    <h1>MT Global Dashboard</h1>
    <p id="period-label">Upload files to begin or select a stored month below</p>
  </div>
  <div class="upload-row">
    <label class="upload-btn" for="kpi-file">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      KPI (CSV)
      <span class="badge badge-kpi" id="kpi-badge">—</span>
    </label>
    <input type="file" id="kpi-file" accept=".csv">
    <label class="upload-btn" for="ref-file">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Refunds (CSV)
      <span class="badge badge-ref" id="ref-badge">—</span>
    </label>
    <input type="file" id="ref-file" accept=".csv">
    <div style="width:1px;height:32px;background:var(--border);align-self:center"></div>
    <button class="upload-btn" onclick="exportData()" title="Export all saved months to a file">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export data
    </button>
    <label class="upload-btn" for="import-file" title="Import saved months from another device">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import data
    </label>
    <input type="file" id="import-file" accept=".json">
  </div>
</div>

<!-- Stored months -->
<div id="stored-section" style="display:none;margin-bottom:16px">
  <div class="stored-header">
    <span>Saved months</span>
    <button class="clear-all" onclick="clearAllStored()">Clear all</button>
  </div>
  <div class="stored-list" id="stored-list"></div>
</div>

<!-- Filter bar -->
<div class="filter-bar" id="filter-bar" style="display:none">
  <div class="filter-group">
    <span class="filter-label">Month</span>
    <select class="filter-select" id="month-select" onchange="setMonth(this.value)"></select>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Agent</span>
    <div class="agent-filter-wrap" id="agent-pills"></div>
  </div>
  <span class="storage-note" id="storage-note"></span>
</div>

<div class="modal-wrap" id="modal-wrap">
  <div id="content">
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Upload your Commslayer KPI CSV and Refunds CSV to begin.<br>Data is saved in your browser — no re-upload needed next visit.
    </div>
  </div>
</div>

</div>
<script>
const AGENTS=['Anne','Sam','Alyssa','Andrea','Pier'];
const VA_AGENTS=['Anne','Sam','Alyssa','Andrea']; // exclude Pier from top performers
const COLORS={Anne:'#378ADD',Sam:'#E24B4A',Alyssa:'#1D9E75',Andrea:'#7F77DD',Pier:'#BA7517'};
const INITIALS={Anne:'AY',Sam:'ST',Alyssa:'AL',Andrea:'AN',Pier:'PV'};
const ALL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const STORE_KEY='mt_global_dashboard_v1';

let activeMonth=null,activeAgent='All',CHARTS={};
let pendingCSV=null,selectedPickMonth=null;

// ---------- STORAGE ----------
function loadStore(){
  try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}');}catch(e){return{};}
}
function saveStore(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){alert('Storage full — try clearing an old month.');}}
function getStore(){return loadStore();}

function storedMonths(){
  const s=loadStore();return Object.keys(s).sort((a,b)=>{
    const ai=ALL_MONTHS.indexOf(a),bi=ALL_MONTHS.indexOf(b);
    return(ai<0?99:ai)-(bi<0?99:bi);
  });
}

function saveMonth(month,kpiRows,refRows){
  const s=loadStore();
  s[month]={kpi:kpiRows,refs:refRows,saved:Date.now()};
  saveStore(s);
  renderStoredChips();
}

function deleteMonth(month){
  const s=loadStore();delete s[month];saveStore(s);
  renderStoredChips();
  if(activeMonth===month){activeMonth=null;renderFromStore();}
}

function clearAllStored(){
  if(!confirm('Clear all saved months?'))return;
  localStorage.removeItem(STORE_KEY);
  renderStoredChips();
  document.getElementById('content').innerHTML='<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>All saved data cleared. Upload new files to begin.</div>';
  document.getElementById('filter-bar').style.display='none';
}

function renderStoredChips(){
  const ms=storedMonths();
  const sec=document.getElementById('stored-section');
  const list=document.getElementById('stored-list');
  if(ms.length===0){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=ms.map(m=>`
    <div class="stored-chip" onclick="loadStoredMonth('${m}')">
      ${m}
      <span class="x" onclick="event.stopPropagation();deleteMonth('${m}')" title="Remove">×</span>
    </div>`).join('');
}

function loadStoredMonth(month){
  const s=loadStore();
  const entry=s[month];
  if(!entry)return;
  activeMonth=month;
  activeAgent='All';
  renderDashboard(entry.kpi,entry.refs);
}

function renderFromStore(){
  const ms=storedMonths();
  if(ms.length===0){document.getElementById('filter-bar').style.display='none';return;}
  const m=ms[ms.length-1];
  loadStoredMonth(m);
}

// ---------- UPLOADS ----------
document.getElementById('kpi-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    window._pendingKPI=parseKPI(ev.target.result);
    document.getElementById('kpi-badge').textContent='Ready';
    maybeSaveAndRender();
  };
  r.readAsText(f);e.target.value='';
});

document.getElementById('ref-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const csv=ev.target.result;
    if(detectMonthCol(csv)){
      window._pendingRefs=parseRefs(csv,null);
      document.getElementById('ref-badge').textContent='Ready';
      maybeSaveAndRender();
    } else {
      pendingCSV=csv;
      showMonthPicker();
    }
  };
  r.readAsText(f);e.target.value='';
});

function maybeSaveAndRender(){
  if(window._pendingKPI&&window._pendingRefs){
    // figure out month from refs
    const ms=[...new Set(window._pendingRefs.map(r=>r.mon))].filter(m=>m&&m!=='Unknown');
    const month=ms[0]||'Unknown';
    activeMonth=month;
    saveMonth(month,window._pendingKPI,window._pendingRefs);
    document.getElementById('kpi-badge').textContent='Saved';
    document.getElementById('ref-badge').textContent='Saved';
    renderStoredChips();
    renderDashboard(window._pendingKPI,window._pendingRefs);
    window._pendingKPI=null;window._pendingRefs=null;
  }
}

function detectMonthCol(csv){
  return /month/i.test(csv.trim().split('\n')[0]);
}

function showMonthPicker(){
  selectedPickMonth=null;
  const wrap=document.getElementById('modal-wrap');
  const ex=wrap.querySelector('.modal-overlay');if(ex)ex.remove();
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal">
    <h3>Which month is this refund file?</h3>
    <p>No month column detected. Select the month this CSV covers.</p>
    <div class="modal-months">${ALL_MONTHS.map(m=>`<button class="mpick" data-m="${m}">${m}</button>`).join('')}</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="mpick-cancel">Cancel</button>
      <button class="btn-confirm" id="mpick-confirm" disabled>Confirm</button>
    </div>
  </div>`;
  overlay.querySelectorAll('.mpick').forEach(btn=>{
    btn.addEventListener('click',()=>{
      overlay.querySelectorAll('.mpick').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');selectedPickMonth=btn.dataset.m;
      overlay.querySelector('#mpick-confirm').disabled=false;
    });
  });
  overlay.querySelector('#mpick-cancel').addEventListener('click',()=>{overlay.remove();pendingCSV=null;});
  overlay.querySelector('#mpick-confirm').addEventListener('click',()=>{
    if(!selectedPickMonth)return;
    overlay.remove();
    window._pendingRefs=parseRefs(pendingCSV,selectedPickMonth);
    pendingCSV=null;
    document.getElementById('ref-badge').textContent='Ready';
    maybeSaveAndRender();
  });
  wrap.appendChild(overlay);
}

// ---------- PARSE ----------
function parseKPI(csv){
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(l=>{
    const v=l.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const o={};hdrs.forEach((h,i)=>o[h]=v[i]||'');
    o._a=AGENTS.find(a=>o['Agent Name']&&o['Agent Name'].toLowerCase().includes(a.toLowerCase()));
    return o;
  }).filter(o=>o._a);
}

function parseRefs(csv,forceMonth){
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const fi=h=>hdrs.findIndex(x=>x.toLowerCase().includes(h));
  const vaI=fi('va'),valI=fi('refund value'),pctI=fi('refund %'),reaI=fi('reason'),monI=fi('month');
  return lines.slice(1).map(l=>{
    const v=splitCSV(l);
    const va=vaI>=0?v[vaI]:'';
    const ag=AGENTS.find(a=>va.toLowerCase().includes(a.toLowerCase()));
    if(!ag)return null;
    const raw=valI>=0?v[valI].replace(/[£$,\s]/g,''):'';
    const val=parseFloat(raw)||0;
    const pct=pctI>=0?v[pctI].trim():'';
    const rea=reaI>=0?v[reaI].trim():'';
    let mon=forceMonth||(monI>=0?v[monI].trim():'')||detectMonthFromLine(l);
    if(!mon)mon='Unknown';
    return{ag,val,pct,rea,mon,full:pct.toLowerCase().includes('full')};
  }).filter(Boolean);
}

function detectMonthFromLine(l){
  for(const m of ALL_MONTHS){if(new RegExp(m,'i').test(l))return m;}return'';
}
function splitCSV(l){
  const r=[];let c='',q=false;
  for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;}}
  r.push(c.trim());return r;
}

// ---------- RENDER ----------
function renderDashboard(kpiRows,refRows){
  Object.values(CHARTS).forEach(c=>{try{c.destroy();}catch(e){}});CHARTS={};

  // filter bar
  const fb=document.getElementById('filter-bar');
  fb.style.display='flex';

  // month select — pull from store
  const ms=storedMonths();
  const msel=document.getElementById('month-select');
  msel.innerHTML=ms.map(m=>`<option value="${m}"${m===activeMonth?' selected':''}>${m} 2026</option>`).join('');
  msel.onchange=function(){activeMonth=this.value;loadStoredMonth(this.value);};

  // agent pills
  const apw=document.getElementById('agent-pills');
  const allAgents=['All',...AGENTS];
  apw.innerHTML=allAgents.map(a=>{
    const col=COLORS[a]||'';
    const isM=a==='Pier';
    const style=a!=='All'&&activeAgent===a?`background:${col};border-color:${col};`:'';
    return`<button class="agent-pill${activeAgent===a?' active':''}${isM?' manager':''}" style="${style}" onclick="setAgent('${a}')">${a==='All'?'All agents':a}${isM?' ★':''}</button>`;
  }).join('');

  // storage note
  const bytes=new Blob([localStorage.getItem(STORE_KEY)||'']).size;
  document.getElementById('storage-note').textContent=`${(bytes/1024).toFixed(0)} KB stored`;

  // filter data
  const fKPI=activeAgent==='All'?kpiRows:kpiRows.filter(r=>r._a===activeAgent);
  const fRefs=refRows?(activeAgent==='All'?refRows:refRows.filter(r=>r.ag===activeAgent)):[];

  // period label
  document.getElementById('period-label').textContent=
    (activeMonth||'—')+' 2026'+(activeAgent!=='All'?' · '+activeAgent+' view':'');

  const ct=document.getElementById('content');ct.innerHTML='';
  if(fKPI.length){
    ct.appendChild(kpiSection(fKPI,kpiRows,fRefs,refRows));
  }
  if(fRefs.length){
    ct.appendChild(refSection(fRefs));
    ct.appendChild(refCharts(fRefs));
  }
  // trend always renders from all stored months
  const trendEl=document.getElementById('trend-section');
  if(trendEl)trendEl.remove();
  const trend=refTrendSection();
  if(trend){trend.id='trend-section';ct.appendChild(trend);}
}

window.setMonth=function(m){activeMonth=m;loadStoredMonth(m);}
window.setAgent=function(a){
  activeAgent=a;
  const s=loadStore();
  const entry=s[activeMonth];
  if(entry)renderDashboard(entry.kpi,entry.refs);
}

// ---------- KPI SECTION ----------
function kpiSection(rows,allRows,fRefs,allRefs){
  const el=document.createElement('div');el.className='section';
  const tot=rows.reduce((s,r)=>s+(parseInt(r['Tickets Replied'])||0),0);
  const cls=rows.reduce((s,r)=>s+(parseInt(r['Closed Tickets'])||0),0);
  const csatAvg=rows.length?(rows.reduce((s,r)=>s+(parseFloat(r['Avg CSAT Score'])||0),0)/rows.length):0;
  const csatC=csatAvg>=4?'good':csatAvg>=3.5?'warn':'bad';

  el.innerHTML=`
    <div class="section-title">KPI summary — ${activeMonth||'—'} 2026${activeAgent!=='All'?' ('+activeAgent+')':''}</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Tickets replied</div><div class="metric-value">${tot.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">Tickets closed</div><div class="metric-value">${cls.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">Team avg CSAT</div><div class="metric-value ${csatC}">${csatAvg.toFixed(1)}</div><div class="metric-sub">out of 5.0</div></div>
      <div class="metric"><div class="metric-label">Agents shown</div><div class="metric-value">${rows.length}</div></div>
    </div>`;

  // top performers — only when showing all agents
  if(activeAgent==='All'&&allRows.length){
    el.appendChild(topPerformers(allRows,allRefs));
  }

  el.innerHTML+=`
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Agent</th><th>Replied</th><th>Closed</th><th>Closed %</th><th>CSAT</th><th>First response</th><th>Avg response</th><th>Resolution</th><th>1-touch %</th></tr></thead>
      <tbody>${rows.map(r=>{
        const sc=parseFloat(r['Avg CSAT Score'])||0;
        const cc=sc>=4?'good':sc>=3.5?'warn':'bad';
        const stars=Array.from({length:5},(_,i)=>`<div class="star ${i<Math.round(sc)?'fill':'empty'}"></div>`).join('');
        const cp=parseFloat(r['Closed Tickets %'])||0;
        const mx=Math.max(...rows.map(x=>parseFloat(x['Closed Tickets %'])||0));
        const bw=mx>0?Math.round(cp/mx*80):0;
        const col=COLORS[r._a]||'#888';
        const isMgr=r._a==='Pier';
        return`<tr class="${isMgr?'manager-row':''}"><td><div style="display:flex;align-items:center;gap:8px"><div class="chip" style="background:${col}22;color:${col}">${INITIALS[r._a]||'?'}</div>${r._a}</div></td><td>${r['Tickets Replied']||'—'}</td><td>${r['Closed Tickets']||'—'}</td><td><div class="bar-cell"><div class="bar" style="width:${bw}px"></div>${r['Closed Tickets %']||'—'}</div></td><td><div style="display:flex;align-items:center;gap:6px"><div class="star-row">${stars}</div><span class="${cc}" style="font-size:12px;font-weight:500">${sc.toFixed(1)}</span></div></td><td>${r['First Response Time']||'—'}</td><td>${r['Avg Response Time']||'—'}</td><td>${r['Resolution Time']||'—'}</td><td>${r['One Touch Tickets %']||'—'}</td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;

  // CSAT chart
  el.innerHTML+=`<div class="card chart-wrap">
    <div class="section-title" style="margin-bottom:10px">CSAT by agent</div>
    <div class="legend">${rows.map(r=>`<span><span class="ldot" style="background:${COLORS[r._a]}"></span>${r._a} ${(parseFloat(r['Avg CSAT Score'])||0).toFixed(1)}</span>`).join('')}</div>
    <div style="position:relative;height:190px"><canvas id="csatC" role="img" aria-label="CSAT scores">CSAT: ${rows.map(r=>r._a+' '+r['Avg CSAT Score']).join(', ')}</canvas></div>
  </div>`;

  setTimeout(()=>{
    const c=document.getElementById('csatC');if(!c)return;
    CHARTS.csat=new Chart(c,{type:'bar',data:{labels:rows.map(r=>r._a),datasets:[{data:rows.map(r=>parseFloat(r['Avg CSAT Score'])||0),backgroundColor:rows.map(r=>COLORS[r._a]+'99'),borderColor:rows.map(r=>COLORS[r._a]),borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:5,ticks:{color:'#888780',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}});
  },80);
  return el;
}

// ---------- TOP PERFORMERS ----------
function parseTime(t){
  if(!t||t==='-')return Infinity;
  t=t.trim();
  if(/^\d+(\.\d+)?m$/.test(t))return parseFloat(t)*60;
  if(/^\d+(\.\d+)?h$/.test(t))return parseFloat(t)*3600;
  if(/^\d+(\.\d+)?d$/.test(t))return parseFloat(t)*86400;
  return Infinity;
}

function topPerformers(kpiRows,refRows){
  const wrap=document.createElement('div');
  // only VA agents (exclude Pier)
  const vaRows=kpiRows.filter(r=>VA_AGENTS.includes(r._a));
  if(!vaRows.length)return wrap;

  // refund totals per VA agent
  const refTotals={};VA_AGENTS.forEach(a=>{refTotals[a]=0;});
  if(refRows){refRows.filter(r=>VA_AGENTS.includes(r.ag)).forEach(r=>{refTotals[r.ag]=(refTotals[r.ag]||0)+r.val;});}
  const hasRefData=Object.values(refTotals).some(v=>v>0);

  // CSAT winner
  const csatWinner=vaRows.reduce((b,r)=>(parseFloat(r['Avg CSAT Score'])||0)>(parseFloat(b['Avg CSAT Score'])||0)?r:b);

  // Fastest first response
  const speedWinner=vaRows.reduce((b,r)=>parseTime(r['First Response Time'])<parseTime(b['First Response Time'])?r:b);

  // Lowest refunds
  const refWinner=hasRefData?VA_AGENTS.reduce((a,b)=>refTotals[a]<=refTotals[b]?a:b):null;

  // Weighted best performer: CSAT 40%, closed tickets % 30%, one-touch % 20%, FRT speed 10%
  function score(r){
    const csat=(parseFloat(r['Avg CSAT Score'])||0)/5;
    const closedPct=parseFloat(r['Closed Tickets %'])||0;
    const oneTouch=parseFloat(r['One Touch Tickets %'])||0;
    const frtSec=parseTime(r['First Response Time']);
    const frtScore=frtSec===Infinity?0:Math.max(0,1-(frtSec/86400));
    return csat*0.4+(closedPct/100)*0.3+(oneTouch/100)*0.2+frtScore*0.1;
  }
  const bestWinner=vaRows.reduce((b,r)=>score(r)>score(b)?r:b);

  wrap.className='highlights';
  wrap.innerHTML=`
    <div class="highlight-card hl-best">
      <div class="hl-icon">🏆</div>
      <div class="hl-label">Best performer</div>
      <div class="hl-name">${bestWinner._a}</div>
      <div class="hl-stat">Weighted score: ${(score(bestWinner)*100).toFixed(0)}/100</div>
    </div>
    <div class="highlight-card hl-csat">
      <div class="hl-icon">⭐</div>
      <div class="hl-label">Best in CSAT</div>
      <div class="hl-name">${csatWinner._a}</div>
      <div class="hl-stat">Score: ${(parseFloat(csatWinner['Avg CSAT Score'])||0).toFixed(1)} / 5.0</div>
    </div>
    ${hasRefData&&refWinner?`<div class="highlight-card hl-refund">
      <div class="hl-icon">💚</div>
      <div class="hl-label">Lowest refunds</div>
      <div class="hl-name">${refWinner}</div>
      <div class="hl-stat">£${refTotals[refWinner].toFixed(0)} total value</div>
    </div>`:''}
    <div class="highlight-card hl-speed">
      <div class="hl-icon">⚡</div>
      <div class="hl-label">Fastest response</div>
      <div class="hl-name">${speedWinner._a}</div>
      <div class="hl-stat">First response: ${speedWinner['First Response Time']}</div>
    </div>`;
  return wrap;
}

// ---------- REFUND SECTION ----------
function refSection(rows){
  const el=document.createElement('div');el.className='section';
  const ast={};AGENTS.forEach(a=>{ast[a]={n:0,val:0,full:0};});
  rows.forEach(r=>{if(!ast[r.ag])return;ast[r.ag].n++;ast[r.ag].val+=r.val;if(r.full)ast[r.ag].full++;});
  const totV=rows.reduce((s,r)=>s+r.val,0);
  const totN=rows.length,fullN=rows.filter(r=>r.full).length;
  const top=AGENTS.reduce((a,b)=>ast[a].val>ast[b].val?a:b);
  const mx=Math.max(...AGENTS.map(a=>ast[a].val));
  const shownAgents=activeAgent==='All'?AGENTS:[activeAgent];
  el.innerHTML=`
    <div class="section-title">Refund metrics — ${activeMonth||'—'} 2026${activeAgent!=='All'?' ('+activeAgent+')':''}</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Total refunds</div><div class="metric-value">${totN}</div></div>
      <div class="metric"><div class="metric-label">Total value</div><div class="metric-value warn">£${totV.toFixed(0)}</div></div>
      <div class="metric"><div class="metric-label">Full refunds</div><div class="metric-value bad">${fullN}</div><div class="metric-sub">${totN?((fullN/totN)*100).toFixed(1)+'%':'—'} of total</div></div>
      <div class="metric"><div class="metric-label">Partial refunds</div><div class="metric-value">${totN-fullN}</div><div class="metric-sub">${totN?(((totN-fullN)/totN)*100).toFixed(1)+'%':'—'} of total</div></div>
      ${activeAgent==='All'?`<div class="metric"><div class="metric-label">Highest value agent</div><div class="metric-value" style="font-size:16px;color:${COLORS[top]}">${top}</div><div class="metric-sub">£${ast[top].val.toFixed(0)}</div></div>`:''}
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Agent</th><th>Refunds</th><th>Full</th><th>Partial</th><th>Total value</th><th>Share</th></tr></thead>
      <tbody>${shownAgents.map(a=>{
        const s=ast[a];const pct=totV>0?s.val/totV*100:0;const bw=mx>0?Math.round(s.val/mx*80):0;const col=COLORS[a];
        return`<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="chip" style="background:${col}22;color:${col}">${INITIALS[a]}</div>${a}</div></td><td>${s.n}</td><td><span class="bad">${s.full}</span></td><td>${s.n-s.full}</td><td><div class="bar-cell"><div class="bar teal" style="width:${bw}px"></div><strong>£${s.val.toFixed(2)}</strong></div></td><td>${pct.toFixed(1)}%</td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
  return el;
}

  el.innerHTML=`
    <div class="card chart-wrap">
      <div class="section-title" style="margin-bottom:10px">Refund value by agent</div>
      <div class="legend">${shownAgents.map(a=>`<span><span class="ldot" style="background:${COLORS[a]}"></span>${a} £${av[a].toFixed(0)}</span>`).join('')}</div>
      <div style="position:relative;height:200px"><canvas id="rvC" role="img" aria-label="Refund value by agent">Values: ${shownAgents.map(a=>a+' £'+av[a].toFixed(0)).join(', ')}</canvas></div>
    </div>
    <div class="card chart-wrap">
      <div class="section-title" style="margin-bottom:10px">Top refund reasons</div>
      <div style="position:relative;height:${Math.max(tr.length*40+60,160)}px"><canvas id="rrC" role="img" aria-label="Top refund reasons">Reasons: ${tr.map(r=>r[0]+' '+r[1]).join(', ')}</canvas></div>
    </div>`;
  setTimeout(()=>{
    const rv=document.getElementById('rvC');const rr=document.getElementById('rrC');
    if(rv)CHARTS.rv=new Chart(rv,{type:'bar',data:{labels:shownAgents,datasets:[{data:shownAgents.map(a=>av[a]),backgroundColor:shownAgents.map(a=>COLORS[a]+'99'),borderColor:shownAgents.map(a=>COLORS[a]),borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}});
    if(rr)CHARTS.rr=new Chart(rr,{type:'bar',data:{labels:tr.map(r=>r[0]),datasets:[{data:tr.map(r=>r[1]),backgroundColor:'#1D9E7566',borderColor:'#1D9E75',borderWidth:1.5,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888780',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{color:'#888780',font:{size:11}},grid:{display:false}}}}});
  },80);
  return el;
}

// ---------- TREND SECTION ----------
function refTrendSection(){
  const s=loadStore();
  const ms=storedMonths();
  if(ms.length<1)return null;

  const el=document.createElement('div');el.className='section';

  // build per-month totals per agent + overall
  const monthTotals=ms.map(m=>{
    const entry=s[m];
    const totals={month:m,total:0};
    AGENTS.forEach(a=>{totals[a]=0;});
    if(entry&&entry.refs){
      entry.refs.forEach(r=>{
        if(totals[r.ag]!==undefined){totals[r.ag]+=r.val;totals.total+=r.val;}
      });
    }
    return totals;
  });

  // summary table
  const tableRows=ms.map(m=>{
    const d=monthTotals.find(x=>x.month===m);
    const agCells=AGENTS.map(a=>`<td>£${(d[a]||0).toFixed(0)}</td>`).join('');
    const isActive=m===activeMonth;
    return`<tr style="${isActive?'font-weight:500;background:var(--bg2)':''}"><td>${m} 2026</td>${agCells}<td><strong>£${(d.total||0).toFixed(0)}</strong></td></tr>`;
  }).join('');

  el.innerHTML=`
    <div class="section-title">Refund trend — all saved months</div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="card chart-wrap">
        <div style="font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Total refund value per month</div>
        <div class="legend"><span><span class="ldot" style="background:#378ADD"></span>Total</span></div>
        <div style="position:relative;height:220px"><canvas id="trendTotal" role="img" aria-label="Total refund value per month">Months: ${ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return m+' £'+(d.total||0).toFixed(0);}).join(', ')}</canvas></div>
      </div>
      <div class="card chart-wrap">
        <div style="font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Refund value by agent across months</div>
        <div class="legend">${AGENTS.map(a=>`<span><span class="ldot" style="background:${COLORS[a]}"></span>${a}</span>`).join('')}</div>
        <div style="position:relative;height:220px"><canvas id="trendAgents" role="img" aria-label="Refund value by agent across months">Agent trends across months</canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Month</th>${AGENTS.map(a=>`<th style="color:${COLORS[a]}">${a}</th>`).join('')}<th>Total</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>
    </div>`;

  setTimeout(()=>{
    const tt=document.getElementById('trendTotal');
    const ta=document.getElementById('trendAgents');
    if(tt){
      CHARTS.trendTotal=new Chart(tt,{
        type:'line',
        data:{
          labels:ms,
          datasets:[{
            label:'Total',
            data:ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return+(d.total||0).toFixed(2);}),
            borderColor:'#378ADD',backgroundColor:'#378ADD22',fill:true,tension:0.3,pointRadius:5,pointHoverRadius:7,borderWidth:2
          }]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}
      });
    }
    if(ta){
      CHARTS.trendAgents=new Chart(ta,{
        type:'bar',
        data:{
          labels:ms,
          datasets:AGENTS.map(a=>({
            label:a,
            data:ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return+(d[a]||0).toFixed(2);}),
            backgroundColor:COLORS[a]+'99',borderColor:COLORS[a],borderWidth:1.5,borderRadius:3
          }))
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:'#888780',font:{size:12}},grid:{display:false}},y:{stacked:true,ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}}}}
      });
    }
  },80);
  return el;
}

// ---------- EXPORT / IMPORT ----------
function exportData(){
  const s=loadStore();
  const ms=Object.keys(s);
  if(ms.length===0){alert('No saved months to export yet.');return;}
  const json=JSON.stringify(s,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`mt-global-data-${date}.json`;
  a.click();URL.revokeObjectURL(url);
}

document.getElementById('import-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const incoming=JSON.parse(ev.target.result);
      if(typeof incoming!=='object'||Array.isArray(incoming))throw new Error('Invalid format');
      const existing=loadStore();
      const inMonths=Object.keys(incoming);
      const overlap=inMonths.filter(m=>existing[m]);
      let proceed=true;
      if(overlap.length>0){
        proceed=confirm(`These months already exist in your browser and will be overwritten:\n\n${overlap.join(', ')}\n\nContinue?`);
      }
      if(!proceed){e.target.value='';return;}
      const merged={...existing,...incoming};
      saveStore(merged);
      renderStoredChips();
      // load the most recent imported month
      const sorted=Object.keys(incoming).sort((a,b)=>{
        const ai=ALL_MONTHS.indexOf(a),bi=ALL_MONTHS.indexOf(b);
        return(ai<0?99:ai)-(bi<0?99:bi);
      });
      if(sorted.length){
        activeMonth=sorted[sorted.length-1];
        loadStoredMonth(activeMonth);
      }
      alert(`✓ Imported ${inMonths.length} month${inMonths.length>1?'s':''}: ${inMonths.join(', ')}`);
    }catch(err){
      alert('Could not read file. Make sure it is a valid MT Global export.\n\n'+err.message);
    }
    e.target.value='';
  };
  r.readAsText(f);
});

// ---------- INIT ----------
renderStoredChips();
const initMonths=storedMonths();
if(initMonths.length>0){
  activeMonth=initMonths[initMonths.length-1];
  loadStoredMonth(activeMonth);
}
