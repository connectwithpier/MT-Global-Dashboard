<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT Global Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--blue50:#E6F1FB;--blue400:#378ADD;--blue800:#0C447C;--teal50:#E1F5EE;--teal400:#1D9E75;--teal800:#085041;--red50:#FCEBEB;--red400:#E24B4A;--red800:#791F1F;--amber50:#FAEEDA;--amber400:#BA7517;--amber800:#633806;--purple50:#EEEDFE;--purple400:#7F77DD;--purple800:#3C3489;--radius:8px;--radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--text:#f0ede8;--text2:#b4b2a9;--text3:#73726c;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);--blue400:#85B7EB;--teal400:#5DCAA5;--red400:#F09595;--amber400:#EF9F27;--purple400:#AFA9EC}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{max-width:1160px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:16px}
.header h1{font-size:20px;font-weight:500}
.header p{font-size:13px;color:var(--text2);margin-top:3px}
.refresh-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;white-space:nowrap}
.refresh-btn:hover{background:var(--bg2)}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;padding:12px 16px;background:var(--bg2);border-radius:var(--radius-lg);border:0.5px solid var(--border)}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-label{font-size:12px;color:var(--text2);white-space:nowrap}
.filter-select{padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer}
.filter-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.agent-filter-wrap{display:flex;gap:6px;flex-wrap:wrap}
.agent-pill{padding:4px 11px;border:0.5px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text2);cursor:pointer;font-size:12px;white-space:nowrap}
.agent-pill.active{color:#fff;border-color:transparent}
.last-updated{font-size:11px;color:var(--text3);margin-left:auto}
.section{margin-bottom:32px}
.section-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.good{color:var(--teal400)}.warn{color:var(--amber400)}.bad{color:var(--red400)}
.highlights{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.highlight-card{border-radius:var(--radius-lg);padding:16px 18px;border:0.5px solid var(--border);background:var(--bg)}
.hl-icon{font-size:18px;margin-bottom:8px}
.hl-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:4px}
.hl-name{font-size:18px;font-weight:500;margin-bottom:2px}
.hl-stat{font-size:12px;color:var(--text2)}
.hl-best{border-color:#BA7517;background:#FAEEDA}.hl-best .hl-label,.hl-best .hl-name{color:#633806}
.hl-csat{border-color:#378ADD;background:#E6F1FB}.hl-csat .hl-label,.hl-csat .hl-name{color:#0C447C}
.hl-refund{border-color:#1D9E75;background:#E1F5EE}.hl-refund .hl-label,.hl-refund .hl-name{color:#085041}
.hl-speed{border-color:#7F77DD;background:#EEEDFE}.hl-speed .hl-label,.hl-speed .hl-name{color:#3C3489}
@media(prefers-color-scheme:dark){
  .hl-best{background:#412402;border-color:var(--amber400)}.hl-best .hl-label,.hl-best .hl-name{color:#FAC775}
  .hl-csat{background:#042C53;border-color:var(--blue400)}.hl-csat .hl-label,.hl-csat .hl-name{color:#B5D4F4}
  .hl-refund{background:#04342C;border-color:var(--teal400)}.hl-refund .hl-label,.hl-refund .hl-name{color:#9FE1CB}
  .hl-speed{background:#26215C;border-color:var(--purple400)}.hl-speed .hl-label,.hl-speed .hl-name{color:#CECBF6}
}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-weight:500;font-size:12px;color:var(--text2);border-bottom:0.5px solid var(--border);background:var(--bg2)}
td{padding:10px 14px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
tr.manager-row td{opacity:0.7}
tr.manager-row td:first-child::after{content:' (mgr)';font-size:10px;color:var(--text3)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar{height:6px;border-radius:3px;background:var(--blue400)}
.bar.teal{background:var(--teal400)}
.star{width:10px;height:10px;border-radius:1px;display:inline-block}
.star.fill{background:var(--amber400)}.star.empty{background:var(--bg3)}
.star-row{display:flex;gap:2px}
.chip{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:500}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.chart-wrap{padding:16px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.ldot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
.loading-state,.empty-state{padding:48px 20px;text-align:center;color:var(--text3);font-size:13px}
.loading-state svg,.empty-state svg{display:block;margin:0 auto 12px;opacity:0.35}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--blue400);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
.error-banner{background:var(--red50);border:0.5px solid var(--red400);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red800)}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div>
    <h1>MT Global Dashboard</h1>
    <p id="period-label">Loading data from Google Sheets…</p>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Refresh data
  </button>
</div>

<div class="filter-bar" id="filter-bar" style="display:none">
  <div class="filter-group">
    <span class="filter-label">Month</span>
    <select class="filter-select" id="month-select" onchange="applyFilters()"></select>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Agent</span>
    <div class="agent-filter-wrap" id="agent-pills"></div>
  </div>
  <span class="last-updated" id="last-updated"></span>
</div>

<div id="content">
  <div class="loading-state">
    <div class="spinner"></div>
    Fetching live data from Google Sheets…
  </div>
</div>

</div>
<script>
const KPI_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTZStqtEya_XilmcZ6ChwAmAytxLmDAPPjf8M5LwixsVxa7mpG__94IBaoAcJdhPn15nhAF4XZP6fyp/pub?gid=0&single=true&output=csv';
const REF_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNWNkH6uJSZZfXIzvJ5o8HAwrXBBByDp9O8rp9xHqtUk9yUhQQj_29kcpbvP45Foc8PLWO28SmEZR/pub?output=csv';

const AGENTS=['Anne','Sam','Alyssa','Andrea','Pier'];
const VA_AGENTS=['Anne','Sam','Alyssa','Andrea'];
const COLORS={Anne:'#378ADD',Sam:'#E24B4A',Alyssa:'#1D9E75',Andrea:'#7F77DD',Pier:'#BA7517'};
const INITIALS={Anne:'AY',Sam:'ST',Alyssa:'AL',Andrea:'AN',Pier:'PV'};
const ALL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

let allKPI=[],allRefs=[],availableMonths=[],activeMonth='All',activeAgent='All',CHARTS={};

async function fetchAll(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('loading');
  document.getElementById('content').innerHTML='<div class="loading-state"><div class="spinner"></div>Fetching live data from Google Sheets…</div>';
  document.getElementById('filter-bar').style.display='none';
  try{
    const [kcsv,rcsv]=await Promise.all([
      fetch(KPI_URL+'&t='+Date.now()).then(r=>r.text()),
      fetch(REF_URL+'&t='+Date.now()).then(r=>r.text())
    ]);
    allKPI=parseKPI(kcsv);
    allRefs=parseRefs(rcsv);
    const refMonths=getMonths(allRefs);
    const kpiMonths=getMonths(allKPI.map(r=>({mon:r._month})));
    const merged=Array.from(new Set([...kpiMonths,...refMonths])).sort((a,b)=>{
      const ai=ALL_MONTHS.indexOf(a),bi=ALL_MONTHS.indexOf(b);
      return(ai<0?99:ai)-(bi<0?99:bi);
    });
    availableMonths=merged;
    activeMonth=availableMonths.length?availableMonths[availableMonths.length-1]:'All';
    activeAgent='All';
    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString();
    render();
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="error-banner">Could not load data. Check your internet connection and try refreshing.<br><small>${e.message}</small></div>`;
  }
  btn.classList.remove('loading');
}

function getMonths(refs){
  const s=new Set(refs.map(r=>r.mon).filter(Boolean));
  return Array.from(s).sort((a,b)=>{
    const ai=ALL_MONTHS.indexOf(a),bi=ALL_MONTHS.indexOf(b);
    return(ai<0?99:ai)-(bi<0?99:bi);
  });
}

function parseKPI(csv){
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const hasMonth=hdrs[0].toLowerCase()==='month';
  return lines.slice(1).map(l=>{
    const v=l.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    if(!v[0]||!v.some(x=>x))return null;
    const o={};hdrs.forEach((h,i)=>o[h]=v[i]||'');
    o._a=AGENTS.find(a=>o['Agent Name']&&o['Agent Name'].toLowerCase().includes(a.toLowerCase()));
    o._month=hasMonth?(o['Month']||'').trim():'';
    return o;
  }).filter(o=>o&&o._a);
}

function parseRefs(csv){
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const fi=h=>hdrs.findIndex(x=>x.toLowerCase().replace(/\s/g,'').includes(h));
  const vaI=fi('va'),valI=fi('refundvalue'),pctI=fi('refund%'),reaI=fi('reason'),dateI=fi('daterefunded');
  return lines.slice(1).map(l=>{
    const v=splitCSV(l);
    const va=vaI>=0?v[vaI]:'';
    const ag=AGENTS.find(a=>va.toLowerCase().includes(a.toLowerCase()));
    if(!ag)return null;
    const raw=valI>=0?v[valI].replace(/[£$,\s]/g,''):'';
    const val=parseFloat(raw)||0;
    const pct=pctI>=0?v[pctI].trim():'';
    const rea=reaI>=0?v[reaI].trim():'';
    const dateStr=dateI>=0?v[dateI].trim():'';
    const mon=monthFromDate(dateStr);
    return{ag,val,pct,rea,mon,full:pct.toLowerCase().includes('full')};
  }).filter(Boolean);
}

function monthFromDate(d){
  if(!d)return'Unknown';
  const dt=new Date(d);
  if(isNaN(dt))return'Unknown';
  return ALL_MONTHS[dt.getMonth()];
}

function splitCSV(l){
  const r=[];let c='',q=false;
  for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;}}
  r.push(c.trim());return r;
}

function render(){
  Object.values(CHARTS).forEach(c=>{try{c.destroy();}catch(e){}});CHARTS={};

  const fb=document.getElementById('filter-bar');
  fb.style.display='flex';

  // month select
  const msel=document.getElementById('month-select');
  msel.innerHTML='<option value="All">All months</option>'+availableMonths.map(m=>`<option value="${m}"${m===activeMonth?' selected':''}>${m} 2026</option>`).join('');

  // agent pills
  const apw=document.getElementById('agent-pills');
  apw.innerHTML=['All',...AGENTS].map(a=>{
    const col=COLORS[a]||'';
    const isMgr=a==='Pier';
    const isActive=activeAgent===a;
    const style=isActive&&a!=='All'?`background:${col};border-color:${col};`:'';
    return`<button class="agent-pill${isActive?' active':''}" style="${style}" onclick="setAgent('${a}')">${a==='All'?'All agents':a}${isMgr?' ★':''}</button>`;
  }).join('');

  // filter data
  const fKPI=allKPI.filter(r=>(activeMonth==='All'||r._month===activeMonth)&&(activeAgent==='All'||r._a===activeAgent));
  const allMonthKPI=activeMonth==='All'?allKPI:allKPI.filter(r=>r._month===activeMonth);
  const fRefs=allRefs.filter(r=>(activeMonth==='All'||r.mon===activeMonth)&&(activeAgent==='All'||r.ag===activeAgent));
  const allMonthRefs=activeAgent==='All'?allRefs:allRefs.filter(r=>r.ag===activeAgent);

  const monthLabel=activeMonth==='All'?'All months':activeMonth+' 2026';
  document.getElementById('period-label').textContent=monthLabel+(activeAgent!=='All'?' · '+activeAgent+' view':'');

  const ct=document.getElementById('content');ct.innerHTML='';
  if(fKPI.length)ct.appendChild(kpiSection(fKPI,allMonthKPI,fRefs,allRefs));
  if(fRefs.length){ct.appendChild(refSection(fRefs,allMonthRefs));ct.appendChild(refCharts(fRefs));}
  const kpiTrend=kpiTrendSection();
  if(kpiTrend)ct.appendChild(kpiTrend);
  const trend=trendSection();
  if(trend)ct.appendChild(trend);
}

window.applyFilters=function(){
  activeMonth=document.getElementById('month-select').value;
  render();
}
window.setAgent=function(a){activeAgent=a;render();}

function parseTime(t){
  if(!t||t==='-')return Infinity;
  t=t.trim();
  if(/^\d+(\.\d+)?m$/.test(t))return parseFloat(t)*60;
  if(/^\d+(\.\d+)?h$/.test(t))return parseFloat(t)*3600;
  if(/^\d+(\.\d+)?d$/.test(t))return parseFloat(t)*86400;
  return Infinity;
}

function kpiSection(rows,allRows,fRefs,allRefs){
  const el=document.createElement('div');el.className='section';
  const tot=rows.reduce((s,r)=>s+(parseInt(r['Tickets Replied'])||0),0);
  const cls=rows.reduce((s,r)=>s+(parseInt(r['Closed Tickets'])||0),0);
  const csatAvg=rows.length?(rows.reduce((s,r)=>s+(parseFloat(r['Avg CSAT Score'])||0),0)/rows.length):0;
  const csatC=csatAvg>=4?'good':csatAvg>=3.5?'warn':'bad';
  const monthLabel=activeMonth==='All'?'All months':activeMonth+' 2026';

  el.innerHTML=`
    <div class="section-title">KPI summary — ${monthLabel}${activeAgent!=='All'?' ('+activeAgent+')':''}</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Tickets replied</div><div class="metric-value">${tot.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">Tickets closed</div><div class="metric-value">${cls.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">Team avg CSAT</div><div class="metric-value ${csatC}">${csatAvg.toFixed(1)}</div><div class="metric-sub">out of 5.0</div></div>
      <div class="metric"><div class="metric-label">Agents</div><div class="metric-value">${rows.length}</div></div>
    </div>`;

  if(activeAgent==='All')el.appendChild(topPerformers(allRows,allRefs));

  const tableHTML=`<div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Agent</th><th>Replied</th><th>Closed</th><th>Closed %</th><th>CSAT</th><th>First response</th><th>Avg response</th><th>Resolution</th><th>1-touch %</th></tr></thead>
    <tbody>${rows.map(r=>{
      const sc=parseFloat(r['Avg CSAT Score'])||0;
      const cc=sc>=4?'good':sc>=3.5?'warn':'bad';
      const stars=Array.from({length:5},(_,i)=>`<div class="star ${i<Math.round(sc)?'fill':'empty'}"></div>`).join('');
      const cp=parseFloat(r['Closed Tickets %'])||0;
      const mx=Math.max(...rows.map(x=>parseFloat(x['Closed Tickets %'])||0));
      const bw=mx>0?Math.round(cp/mx*80):0;
      const col=COLORS[r._a]||'#888';
      const isMgr=r._a==='Pier';
      return`<tr class="${isMgr?'manager-row':''}"><td><div style="display:flex;align-items:center;gap:8px"><div class="chip" style="background:${col}22;color:${col}">${INITIALS[r._a]||'?'}</div>${r._a}</div></td><td>${r['Tickets Replied']||'—'}</td><td>${r['Closed Tickets']||'—'}</td><td><div class="bar-cell"><div class="bar" style="width:${bw}px"></div>${r['Closed Tickets %']||'—'}</div></td><td><div style="display:flex;align-items:center;gap:6px"><div class="star-row">${stars}</div><span class="${cc}" style="font-size:12px;font-weight:500">${sc.toFixed(1)}</span></div></td><td>${r['First Response Time']||'—'}</td><td>${r['Avg Response Time']||'—'}</td><td>${r['Resolution Time']||'—'}</td><td>${r['One Touch Tickets %']||'—'}</td></tr>`;
    }).join('')}</tbody>
  </table></div></div>`;

  const csatHTML=`<div class="card chart-wrap">
    <div class="section-title" style="margin-bottom:10px">CSAT by agent</div>
    <div class="legend">${rows.map(r=>`<span><span class="ldot" style="background:${COLORS[r._a]}"></span>${r._a} ${(parseFloat(r['Avg CSAT Score'])||0).toFixed(1)}</span>`).join('')}</div>
    <div style="position:relative;height:190px"><canvas id="csatC" role="img" aria-label="CSAT scores">CSAT: ${rows.map(r=>r._a+' '+r['Avg CSAT Score']).join(', ')}</canvas></div>
  </div>`;

  el.innerHTML+=tableHTML+csatHTML;

  setTimeout(()=>{
    const c=document.getElementById('csatC');if(!c)return;
    CHARTS.csat=new Chart(c,{type:'bar',data:{labels:rows.map(r=>r._a),datasets:[{data:rows.map(r=>parseFloat(r['Avg CSAT Score'])||0),backgroundColor:rows.map(r=>COLORS[r._a]+'99'),borderColor:rows.map(r=>COLORS[r._a]),borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:5,ticks:{color:'#888780',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}});
  },80);
  return el;
}

function topPerformers(kpiRows,refRows){
  const wrap=document.createElement('div');
  const vaRows=kpiRows.filter(r=>VA_AGENTS.includes(r._a));
  if(!vaRows.length)return wrap;
  const refTotals={};VA_AGENTS.forEach(a=>{refTotals[a]=0;});
  const mRefs=activeMonth==='All'?refRows:refRows.filter(r=>r.mon===activeMonth);
  mRefs.filter(r=>VA_AGENTS.includes(r.ag)).forEach(r=>{refTotals[r.ag]=(refTotals[r.ag]||0)+r.val;});
  const hasRefData=Object.values(refTotals).some(v=>v>0);
  const csatWinner=vaRows.reduce((b,r)=>(parseFloat(r['Avg CSAT Score'])||0)>(parseFloat(b['Avg CSAT Score'])||0)?r:b);
  const speedWinner=vaRows.reduce((b,r)=>parseTime(r['First Response Time'])<parseTime(b['First Response Time'])?r:b);
  const refWinner=hasRefData?VA_AGENTS.reduce((a,b)=>refTotals[a]<=refTotals[b]?a:b):null;
  function score(r){
    const csat=(parseFloat(r['Avg CSAT Score'])||0)/5;
    const cp=parseFloat(r['Closed Tickets %'])||0;
    const ot=parseFloat(r['One Touch Tickets %'])||0;
    const frt=parseTime(r['First Response Time']);
    const frtS=frt===Infinity?0:Math.max(0,1-(frt/86400));
    return csat*0.4+(cp/100)*0.3+(ot/100)*0.2+frtS*0.1;
  }
  const bestWinner=vaRows.reduce((b,r)=>score(r)>score(b)?r:b);
  wrap.className='highlights';
  wrap.innerHTML=`
    <div class="highlight-card hl-best"><div class="hl-icon">🏆</div><div class="hl-label">Best performer</div><div class="hl-name">${bestWinner._a}</div><div class="hl-stat">Weighted score: ${(score(bestWinner)*100).toFixed(0)}/100</div></div>
    <div class="highlight-card hl-csat"><div class="hl-icon">⭐</div><div class="hl-label">Best in CSAT</div><div class="hl-name">${csatWinner._a}</div><div class="hl-stat">Score: ${(parseFloat(csatWinner['Avg CSAT Score'])||0).toFixed(1)} / 5.0</div></div>
    ${hasRefData&&refWinner?`<div class="highlight-card hl-refund"><div class="hl-icon">💚</div><div class="hl-label">Lowest refunds</div><div class="hl-name">${refWinner}</div><div class="hl-stat">£${refTotals[refWinner].toFixed(0)} total value</div></div>`:''}
    <div class="highlight-card hl-speed"><div class="hl-icon">⚡</div><div class="hl-label">Fastest response</div><div class="hl-name">${speedWinner._a}</div><div class="hl-stat">First response: ${speedWinner['First Response Time']}</div></div>`;
  return wrap;
}

function refSection(rows,allMonthRefs){
  const el=document.createElement('div');el.className='section';
  const ast={};AGENTS.forEach(a=>{ast[a]={n:0,val:0,full:0};});
  rows.forEach(r=>{if(!ast[r.ag])return;ast[r.ag].n++;ast[r.ag].val+=r.val;if(r.full)ast[r.ag].full++;});
  const totV=rows.reduce((s,r)=>s+r.val,0);
  const totN=rows.length,fullN=rows.filter(r=>r.full).length;
  const top=AGENTS.reduce((a,b)=>ast[a].val>ast[b].val?a:b);
  const mx=Math.max(...AGENTS.map(a=>ast[a].val));
  const shownAgents=activeAgent==='All'?AGENTS:[activeAgent];
  const monthLabel=activeMonth==='All'?'All months':activeMonth+' 2026';
  el.innerHTML=`
    <div class="section-title">Refund metrics — ${monthLabel}${activeAgent!=='All'?' ('+activeAgent+')':''}</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Total refunds</div><div class="metric-value">${totN}</div></div>
      <div class="metric"><div class="metric-label">Total value</div><div class="metric-value warn">£${totV.toFixed(0)}</div></div>
      <div class="metric"><div class="metric-label">Full refunds</div><div class="metric-value bad">${fullN}</div><div class="metric-sub">${totN?((fullN/totN)*100).toFixed(1)+'%':'—'} of total</div></div>
      <div class="metric"><div class="metric-label">Partial refunds</div><div class="metric-value">${totN-fullN}</div><div class="metric-sub">${totN?(((totN-fullN)/totN)*100).toFixed(1)+'%':'—'} of total</div></div>
      ${activeAgent==='All'?`<div class="metric"><div class="metric-label">Highest value agent</div><div class="metric-value" style="font-size:16px;color:${COLORS[top]}">${top}</div><div class="metric-sub">£${ast[top].val.toFixed(0)}</div></div>`:''}
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Agent</th><th>Refunds</th><th>Full</th><th>Partial</th><th>Total value</th><th>Share</th></tr></thead>
      <tbody>${shownAgents.map(a=>{
        const s=ast[a];const pct=totV>0?s.val/totV*100:0;const bw=mx>0?Math.round(s.val/mx*80):0;const col=COLORS[a];
        return`<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="chip" style="background:${col}22;color:${col}">${INITIALS[a]}</div>${a}</div></td><td>${s.n}</td><td><span class="bad">${s.full}</span></td><td>${s.n-s.full}</td><td><div class="bar-cell"><div class="bar teal" style="width:${bw}px"></div><strong>£${s.val.toFixed(2)}</strong></div></td><td>${pct.toFixed(1)}%</td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
  return el;
}

function refCharts(rows){
  const el=document.createElement('div');el.className='section two-col';
  const shownAgents=activeAgent==='All'?AGENTS:[activeAgent];
  const av={};AGENTS.forEach(a=>{av[a]=0;});
  rows.forEach(r=>{if(av[r.ag]!==undefined)av[r.ag]+=r.val;});
  const rm={};rows.forEach(r=>{const k=(r.rea||'Unknown').slice(0,28);rm[k]=(rm[k]||0)+1;});
  const tr=Object.entries(rm).sort((a,b)=>b[1]-a[1]).slice(0,6);
  el.innerHTML=`
    <div class="card chart-wrap">
      <div class="section-title" style="margin-bottom:10px">Refund value by agent</div>
      <div class="legend">${shownAgents.map(a=>`<span><span class="ldot" style="background:${COLORS[a]}"></span>${a} £${av[a].toFixed(0)}</span>`).join('')}</div>
      <div style="position:relative;height:200px"><canvas id="rvC" role="img" aria-label="Refund value by agent">Values: ${shownAgents.map(a=>a+' £'+av[a].toFixed(0)).join(', ')}</canvas></div>
    </div>
    <div class="card chart-wrap">
      <div class="section-title" style="margin-bottom:10px">Top refund reasons</div>
      <div style="position:relative;height:${Math.max(tr.length*40+60,160)}px"><canvas id="rrC" role="img" aria-label="Top refund reasons">Reasons: ${tr.map(r=>r[0]+' '+r[1]).join(', ')}</canvas></div>
    </div>`;
  setTimeout(()=>{
    const rv=document.getElementById('rvC');const rr=document.getElementById('rrC');
    if(rv)CHARTS.rv=new Chart(rv,{type:'bar',data:{labels:shownAgents,datasets:[{data:shownAgents.map(a=>av[a]),backgroundColor:shownAgents.map(a=>COLORS[a]+'99'),borderColor:shownAgents.map(a=>COLORS[a]),borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}});
    if(rr)CHARTS.rr=new Chart(rr,{type:'bar',data:{labels:tr.map(r=>r[0]),datasets:[{data:tr.map(r=>r[1]),backgroundColor:'#1D9E7566',borderColor:'#1D9E75',borderWidth:1.5,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888780',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{color:'#888780',font:{size:11}},grid:{display:false}}}}});
  },80);
  return el;
}

function kpiTrendSection(){
  const ms=availableMonths.filter(m=>allKPI.some(r=>r._month===m));
  if(ms.length<2)return null;
  const shownAgents=activeAgent==='All'?AGENTS:[activeAgent];
  const el=document.createElement('div');el.className='section';

  // per month per agent stats
  const monthData=ms.map(m=>{
    const rows=allKPI.filter(r=>r._month===m&&(activeAgent==='All'||r._a===activeAgent));
    const d={month:m};
    shownAgents.forEach(a=>{
      const r=rows.find(x=>x._a===a);
      d['csat_'+a]=r?parseFloat(r['Avg CSAT Score'])||0:null;
      d['tickets_'+a]=r?parseInt(r['Tickets Replied'])||0:0;
    });
    d.csatAvg=rows.length?(rows.reduce((s,r)=>s+(parseFloat(r['Avg CSAT Score'])||0),0)/rows.length):0;
    d.totalTickets=rows.reduce((s,r)=>s+(parseInt(r['Tickets Replied'])||0),0);
    return d;
  });

  el.innerHTML=`
    <div class="section-title">KPI trend — all months</div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="card chart-wrap">
        <div class="section-title" style="margin-bottom:10px">CSAT trend by agent</div>
        <div class="legend">${shownAgents.map(a=>`<span><span class="ldot" style="background:${COLORS[a]}"></span>${a}</span>`).join('')}</div>
        <div style="position:relative;height:220px"><canvas id="kpiCsatTrend" role="img" aria-label="CSAT trend by agent across months"></canvas></div>
      </div>
      <div class="card chart-wrap">
        <div class="section-title" style="margin-bottom:10px">Tickets replied per month</div>
        <div class="legend">${shownAgents.map(a=>`<span><span class="ldot" style="background:${COLORS[a]}"></span>${a}</span>`).join('')}</div>
        <div style="position:relative;height:220px"><canvas id="kpiTicketTrend" role="img" aria-label="Tickets replied per month by agent"></canvas></div>
      </div>
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Month</th>${shownAgents.map(a=>`<th style="color:${COLORS[a]}">${a} CSAT</th>`).join('')}<th>Team avg</th><th>Total tickets</th></tr></thead>
      <tbody>${ms.map(m=>{
        const d=monthData.find(x=>x.month===m);
        const isActive=m===activeMonth;
        return`<tr style="${isActive?'font-weight:500;background:var(--bg2)':''}">
          <td>${m} 2026</td>
          ${shownAgents.map(a=>{const v=d['csat_'+a];return`<td>${v!==null?v.toFixed(1):'—'}</td>`;}).join('')}
          <td><strong>${d.csatAvg.toFixed(1)}</strong></td>
          <td>${d.totalTickets.toLocaleString()}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;

  setTimeout(()=>{
    const cc=document.getElementById('kpiCsatTrend');
    const tc=document.getElementById('kpiTicketTrend');
    if(cc)CHARTS.kpiCsat=new Chart(cc,{type:'line',data:{labels:ms,datasets:shownAgents.map(a=>({label:a,data:ms.map(m=>{const d=monthData.find(x=>x.month===m);return d['csat_'+a];}),borderColor:COLORS[a],backgroundColor:COLORS[a]+'22',tension:0.3,pointRadius:5,pointHoverRadius:7,borderWidth:2,fill:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:5,ticks:{color:'#888780',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}});
    if(tc)CHARTS.kpiTickets=new Chart(tc,{type:'bar',data:{labels:ms,datasets:shownAgents.map(a=>({label:a,data:ms.map(m=>{const d=monthData.find(x=>x.month===m);return d['tickets_'+a]||0;}),backgroundColor:COLORS[a]+'99',borderColor:COLORS[a],borderWidth:1.5,borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:'#888780',font:{size:12}},grid:{display:false}},y:{stacked:true,ticks:{color:'#888780',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}}}}});
  },80);
  return el;
}

function trendSection(){
  const ms=availableMonths;
  if(ms.length<1)return null;
  const el=document.createElement('div');el.className='section';
  const shownAgents=activeAgent==='All'?AGENTS:[activeAgent];
  const monthTotals=ms.map(m=>{
    const t={month:m,total:0};
    AGENTS.forEach(a=>{t[a]=0;});
    allRefs.filter(r=>r.mon===m&&(activeAgent==='All'||r.ag===activeAgent)).forEach(r=>{
      if(t[r.ag]!==undefined){t[r.ag]+=r.val;t.total+=r.val;}
    });
    return t;
  });
  const tableRows=ms.map(m=>{
    const d=monthTotals.find(x=>x.month===m);
    const isActive=m===activeMonth;
    const agCells=shownAgents.map(a=>`<td>£${(d[a]||0).toFixed(0)}</td>`).join('');
    return`<tr style="${isActive?'font-weight:500;background:var(--bg2)':''}"><td>${m} 2026</td>${agCells}<td><strong>£${(d.total||0).toFixed(0)}</strong></td></tr>`;
  }).join('');

  el.innerHTML=`
    <div class="section-title">Refund trend — all months</div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="card chart-wrap">
        <div class="section-title" style="margin-bottom:10px">Total refund value per month</div>
        <div class="legend"><span><span class="ldot" style="background:#378ADD"></span>Total</span></div>
        <div style="position:relative;height:220px"><canvas id="trendTotal" role="img" aria-label="Total refund value per month">Months: ${ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return m+' £'+(d.total||0).toFixed(0);}).join(', ')}</canvas></div>
      </div>
      <div class="card chart-wrap">
        <div class="section-title" style="margin-bottom:10px">Refund value by agent across months</div>
        <div class="legend">${shownAgents.map(a=>`<span><span class="ldot" style="background:${COLORS[a]}"></span>${a}</span>`).join('')}</div>
        <div style="position:relative;height:220px"><canvas id="trendAgents" role="img" aria-label="Refund value by agent across months">Agent trends across months</canvas></div>
      </div>
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Month</th>${shownAgents.map(a=>`<th style="color:${COLORS[a]}">${a}</th>`).join('')}<th>Total</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div></div>`;

  setTimeout(()=>{
    const tt=document.getElementById('trendTotal');
    const ta=document.getElementById('trendAgents');
    if(tt)CHARTS.trendTotal=new Chart(tt,{type:'line',data:{labels:ms,datasets:[{label:'Total',data:ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return+(d.total||0).toFixed(2);}),borderColor:'#378ADD',backgroundColor:'#378ADD22',fill:true,tension:0.3,pointRadius:5,pointHoverRadius:7,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}});
    if(ta)CHARTS.trendAgents=new Chart(ta,{type:'bar',data:{labels:ms,datasets:shownAgents.map(a=>({label:a,data:ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return+(d[a]||0).toFixed(2);}),backgroundColor:COLORS[a]+'99',borderColor:COLORS[a],borderWidth:1.5,borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:'#888780',font:{size:12}},grid:{display:false}},y:{stacked:true,ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}}}}});
  },80);
  return el;
}
