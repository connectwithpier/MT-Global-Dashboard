<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>MT Global Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--text:#f0ede8;--text2:#b4b2a9;--text3:#73726c;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);--blue50:#E6F1FB;--blue400:#85B7EB;--blue800:#0C447C;--teal50:#E1F5EE;--teal400:#5DCAA5;--teal800:#085041;--red50:#FCEBEB;--red400:#F09595;--red800:#791F1F;--amber50:#FAEEDA;--amber400:#EF9F27;--amber800:#633806;--purple50:#EEEDFE;--purple400:#AFA9EC;--purple800:#3C3489;--radius:8px;--radius-lg:12px;--dinili:#378ADD;--montanello:#1D9E75}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{max-width:1200px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:16px}
.header h1{font-size:20px;font-weight:500}
.header p{font-size:13px;color:var(--text2);margin-top:3px}
.refresh-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;white-space:nowrap}
.refresh-btn:hover{background:var(--bg2)}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;padding:12px 16px;background:var(--bg2);border-radius:var(--radius-lg);border:0.5px solid var(--border)}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-label{font-size:12px;color:var(--text2);white-space:nowrap}
.filter-select{padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer}
.filter-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.agent-filter-wrap{display:flex;gap:6px;flex-wrap:wrap}
.agent-pill{padding:4px 11px;border:0.5px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text2);cursor:pointer;font-size:12px;white-space:nowrap}
.agent-pill.active{color:#fff;border-color:transparent}
.last-updated{font-size:11px;color:var(--text3);margin-left:auto}
.section{margin-bottom:32px}
.section-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.good{color:var(--teal400)}.warn{color:var(--amber400)}.bad{color:var(--red400)}
.highlights{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.highlight-card{border-radius:var(--radius-lg);padding:16px 18px;border:0.5px solid var(--border);background:var(--bg)}
.hl-icon{font-size:18px;margin-bottom:8px}
.hl-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:4px}
.hl-name{font-size:18px;font-weight:500;margin-bottom:2px}
.hl-stat{font-size:12px;color:var(--text2)}
.hl-best{border-color:var(--amber400);background:#412402}.hl-best .hl-label,.hl-best .hl-name{color:#FAC775}
.hl-csat{border-color:var(--blue400);background:#042C53}.hl-csat .hl-label,.hl-csat .hl-name{color:#B5D4F4}
.hl-refund{border-color:var(--teal400);background:#04342C}.hl-refund .hl-label,.hl-refund .hl-name{color:#9FE1CB}
.hl-speed{border-color:var(--purple400);background:#26215C}.hl-speed .hl-label,.hl-speed .hl-name{color:#CECBF6}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-weight:500;font-size:12px;color:var(--text2);border-bottom:0.5px solid var(--border);background:var(--bg2)}
td{padding:10px 14px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
tr.manager-row td{opacity:0.7}
tr.manager-row td:first-child::after{content:' (mgr)';font-size:10px;color:var(--text3)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar{height:6px;border-radius:3px;background:var(--blue400)}
.bar.teal{background:var(--teal400)}
.star{width:10px;height:10px;border-radius:1px;display:inline-block}
.star.fill{background:var(--amber400)}.star.empty{background:var(--bg3)}
.star-row{display:flex;gap:2px}
.chip{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:500}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.chart-wrap{padding:16px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.ldot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
.loading-state,.empty-state{padding:48px 20px;text-align:center;color:var(--text3);font-size:13px}
.loading-state svg,.empty-state svg{display:block;margin:0 auto 12px;opacity:0.35}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--blue400);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
.error-banner{background:#3A1212;border:0.5px solid var(--red400);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:#F4B8B8}
/* Store comparison */
.store-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:700px){.store-compare{grid-template-columns:1fr}}
.store-card{border-radius:var(--radius-lg);border:0.5px solid var(--border);overflow:hidden}
.store-card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border)}
.store-badge{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.store-card-title{font-size:13px;font-weight:500}
.store-card-body{padding:14px 16px;background:var(--bg2);display:grid;grid-template-columns:1fr 1fr;gap:10px}
.store-stat{display:flex;flex-direction:column;gap:2px}
.store-stat-label{font-size:11px;color:var(--text3)}
.store-stat-value{font-size:17px;font-weight:500}
.store-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:500;border:0.5px solid transparent}
.store-pill.dinili{background:#042C53;color:#B5D4F4;border-color:#378ADD44}
.store-pill.montanello{background:#04342C;color:#9FE1CB;border-color:#1D9E7544}
/* overall scorecard */
.scorecard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.scorecard-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border)}
.scorecard-row:last-child{border-bottom:none}
.scorecard-metric{font-size:12px;color:var(--text2)}
.scorecard-vals{display:flex;gap:16px;align-items:center}
.scorecard-val{text-align:right}
.scorecard-val .label{font-size:10px;color:var(--text3)}
.scorecard-val .val{font-size:14px;font-weight:500}
.vs-divider{font-size:11px;color:var(--text3)}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div>
    <h1>MT Global Dashboard</h1>
    <p id="period-label">Loading data from Google Sheets…</p>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Refresh data
  </button>
</div>

<div class="filter-bar" id="filter-bar" style="display:none">
  <div class="filter-group">
    <span class="filter-label">Month</span>
    <select class="filter-select" id="month-select" onchange="applyFilters()"></select>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Store</span>
    <select class="filter-select" id="store-select" onchange="applyFilters()">
      <option value="All">All stores</option>
      <option value="Dinili">Dinili</option>
      <option value="Montanello">Montanello</option>
    </select>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Agent</span>
    <div class="agent-filter-wrap" id="agent-pills"></div>
  </div>
  <span class="last-updated" id="last-updated"></span>
</div>

<div id="content">
  <div class="loading-state">
    <div class="spinner"></div>
    Fetching live data from Google Sheets…
  </div>
</div>

</div>

<script>
const KPI_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTZStqtEya_XilmcZ6ChwAmAytxLmDAPPjf8M5LwixsVxa7mpG__94IBaoAcJdhPn15nhAF4XZP6fyp/pub?gid=0&single=true&output=csv';
const REF_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNWNkH6uJSZZfXIzvJ5o8HAwrXBBByDp9O8rp9xHqtUk9yUhQQj_29kcpbvP45Foc8PLWO28SmEZR/pub?output=csv';

const AGENTS=['Anne','Sam','Alyssa','Andrea','Pier'];
const VA_AGENTS=['Anne','Sam','Alyssa','Andrea'];
const COLORS={Anne:'#378ADD',Sam:'#E24B4A',Alyssa:'#1D9E75',Andrea:'#7F77DD',Pier:'#BA7517'};
const INITIALS={Anne:'AY',Sam:'ST',Alyssa:'AL',Andrea:'AN',Pier:'PV'};
const ALL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const STORE_COLORS={Dinili:'#378ADD',Montanello:'#1D9E75'};
const STORES=['Dinili','Montanello'];

let allKPI=[],allRefs=[],availableMonths=[],activeMonth='All',activeAgent='All',activeStore='All',CHARTS={};

async function fetchAll(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('loading');
  document.getElementById('content').innerHTML='<div class="loading-state"><div class="spinner"></div>Fetching live data from Google Sheets…</div>';
  document.getElementById('filter-bar').style.display='none';
  try{
    const [kcsv,rcsv]=await Promise.all([
      fetch(KPI_URL+'&t='+Date.now()).then(r=>r.text()),
      fetch(REF_URL+'&t='+Date.now()).then(r=>r.text())
    ]);
    allKPI=parseKPI(kcsv);
    allRefs=parseRefs(rcsv);
    const refMonths=getMonths(allRefs);
    const kpiMonths=getMonths(allKPI.map(r=>({mon:r._month})));
    const merged=Array.from(new Set([...kpiMonths,...refMonths])).sort((a,b)=>{
      const ai=ALL_MONTHS.indexOf(a),bi=ALL_MONTHS.indexOf(b);
      return(ai<0?99:ai)-(bi<0?99:bi);
    });
    availableMonths=merged;
    activeMonth=availableMonths.length?availableMonths[availableMonths.length-1]:'All';
    activeAgent='All';
    activeStore='All';
    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString();
    render();
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="error-banner">Could not load data. Check your internet connection and try refreshing.<br><small>${e.message}</small></div>`;
  }
  btn.classList.remove('loading');
}

function getMonths(refs){
  const s=new Set(refs.map(r=>r.mon).filter(Boolean));
  return Array.from(s).sort((a,b)=>{
    const ai=ALL_MONTHS.indexOf(a),bi=ALL_MONTHS.indexOf(b);
    return(ai<0?99:ai)-(bi<0?99:bi);
  });
}

// Parse KPI CSV — assigns _store by blank-row grouping within each month
function parseKPI(csv){
  const lines=csv.split('\n');
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const hasMonth=hdrs[0].toLowerCase()==='month';
  const rows=[];
  // We need to track groups within each month block
  // A blank row (all empty) signals a new store group within the same month
  let currentMonthGroups={}; // month -> count of groups seen so far

  for(let i=1;i<lines.length;i++){
    const l=lines[i];
    const v=l.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const isEmpty=!v.some(x=>x);
    if(isEmpty)continue; // skip blank rows — they just separate groups, handled by position
    if(!v[0]&&!v[1])continue;
    const o={};hdrs.forEach((h,idx)=>o[h]=v[idx]||'');
    o._a=AGENTS.find(a=>o['Agent Name']&&o['Agent Name'].toLowerCase().includes(a.toLowerCase()));
    o._month=hasMonth?(o['Month']||'').trim():'';
    if(!o._a||!o._month)continue;

    // Determine store group: scan backward from current line to find where this month's data starts
    // Count how many non-blank groups exist for this month up to line i
    const month=o._month;
    if(!currentMonthGroups[month]){
      currentMonthGroups[month]={groups:1,lastAgent:null,seenBlank:false};
    }
    const mg=currentMonthGroups[month];
    // Check if there was a blank line between the previous row and this one for the same month
    // We track this by looking at line i-1
    let prevLineEmpty=false;
    if(i>1){
      const prev=lines[i-1].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      prevLineEmpty=!prev.some(x=>x);
    }
    if(prevLineEmpty&&mg.lastAgent!==null){
      mg.groups++;
    }
    mg.lastAgent=o._a;

    // Group 1 = Dinili, group 2 = Montanello, group 3+ = labeled Store N
    const storeNames=['Dinili','Montanello','Store 3','Store 4'];
    o._store=storeNames[mg.groups-1]||('Store '+mg.groups);
    rows.push(o);
  }
  return rows;
}

function parseRefs(csv){
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const fi=h=>hdrs.findIndex(x=>x.toLowerCase().replace(/\s/g,'').includes(h));
  const vaI=fi('va'),valI=fi('refundvalue'),pctI=fi('refund%'),reaI=fi('reason'),dateI=fi('daterefunded');
  return lines.slice(1).map(l=>{
    const v=splitCSV(l);
    const va=vaI>=0?v[vaI]:'';
    const ag=AGENTS.find(a=>va.toLowerCase().includes(a.toLowerCase()));
    if(!ag)return null;
    const raw=valI>=0?v[valI].replace(/[£$,\s]/g,''):'';
    const val=parseFloat(raw)||0;
    const pct=pctI>=0?v[pctI].trim():'';
    const rea=reaI>=0?v[reaI].trim():'';
    const dateStr=dateI>=0?v[dateI].trim():'';
    const mon=monthFromDate(dateStr);
    return{ag,val,pct,rea,mon,full:pct.toLowerCase().includes('full')};
  }).filter(Boolean);
}

function monthFromDate(d){
  if(!d)return'Unknown';
  const dt=new Date(d);
  if(isNaN(dt))return'Unknown';
  return ALL_MONTHS[dt.getMonth()];
}

function splitCSV(l){
  const r=[];let c='',q=false;
  for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;}}
  r.push(c.trim());return r;
}

function render(){
  Object.values(CHARTS).forEach(c=>{try{c.destroy();}catch(e){}});CHARTS={};
  const fb=document.getElementById('filter-bar');
  fb.style.display='flex';

  const msel=document.getElementById('month-select');
  msel.innerHTML='<option value="All">All months</option>'+availableMonths.map(m=>`<option value="${m}"${m===activeMonth?' selected':''}>${m} 2026</option>`).join('');

  // sync store select
  document.getElementById('store-select').value=activeStore;

  const apw=document.getElementById('agent-pills');
  apw.innerHTML=['All',...AGENTS].map(a=>{
    const col=COLORS[a]||'';
    const isMgr=a==='Pier';
    const isActive=activeAgent===a;
    const style=isActive&&a!=='All'?`background:${col};border-color:${col};`:'';
    return`<button class="agent-pill${isActive?' active':''}" style="${style}" onclick="setAgent('${a}')">${a==='All'?'All agents':a}${isMgr?' ★':''}</button>`;
  }).join('');

  const fKPI=allKPI.filter(r=>
    (activeMonth==='All'||r._month===activeMonth)&&
    (activeAgent==='All'||r._a===activeAgent)&&
    (activeStore==='All'||r._store===activeStore)
  );
  const allMonthKPI=allKPI.filter(r=>
    (activeMonth==='All'||r._month===activeMonth)&&
    (activeStore==='All'||r._store===activeStore)
  );
  const fRefs=allRefs.filter(r=>
    (activeMonth==='All'||r.mon===activeMonth)&&
    (activeAgent==='All'||r.ag===activeAgent)
  );
  const allMonthRefs=activeAgent==='All'?allRefs:allRefs.filter(r=>r.ag===activeAgent);

  const monthLabel=activeMonth==='All'?'All months':activeMonth+' 2026';
  document.getElementById('period-label').textContent=
    monthLabel+
    (activeStore!=='All'?' · '+activeStore:'')+
    (activeAgent!=='All'?' · '+activeAgent+' view':'');

  const ct=document.getElementById('content');ct.innerHTML='';

  // Show store comparison panel when "All stores" is selected and there's multi-store data
  if(activeStore==='All'&&activeAgent==='All'){
    const compareEl=storeCompareSection(allMonthKPI);
    if(compareEl)ct.appendChild(compareEl);
  }

  if(fKPI.length)ct.appendChild(kpiSection(fKPI,allMonthKPI,fRefs,allRefs));
  if(fRefs.length){ct.appendChild(refSection(fRefs,allMonthRefs));ct.appendChild(refCharts(fRefs));}
  const kpiTrend=kpiTrendSection();
  if(kpiTrend)ct.appendChild(kpiTrend);
  const trend=trendSection();
  if(trend)ct.appendChild(trend);
}

window.applyFilters=function(){
  activeMonth=document.getElementById('month-select').value;
  activeStore=document.getElementById('store-select').value;
  render();
}
window.setAgent=function(a){activeAgent=a;render();}

function parseTime(t){
  if(!t||t==='-')return Infinity;
  t=t.trim();
  if(/^\d+(\.\d+)?m$/.test(t))return parseFloat(t)*60;
  if(/^\d+(\.\d+)?h$/.test(t))return parseFloat(t)*3600;
  if(/^\d+(\.\d+)?d$/.test(t))return parseFloat(t)*86400;
  return Infinity;
}

// ── Store comparison section ──────────────────────────────────────────────
function storeCompareSection(kpiRows){
  const stores=STORES.filter(s=>kpiRows.some(r=>r._store===s));
  if(stores.length<2)return null;

  const el=document.createElement('div');el.className='section';

  function storeStats(s){
    const rows=kpiRows.filter(r=>r._store===s);
    if(!rows.length)return null;
    const tot=rows.reduce((acc,r)=>acc+(parseInt(r['Tickets Replied'])||0),0);
    const cls=rows.reduce((acc,r)=>acc+(parseInt(r['Closed Tickets'])||0),0);
    const csat=rows.length?(rows.reduce((acc,r)=>acc+(parseFloat(r['Avg CSAT Score'])||0),0)/rows.length):0;
    const frt=rows.map(r=>parseTime(r['First Response Time'])).filter(v=>v!==Infinity);
    const avgFRT=frt.length?(frt.reduce((a,b)=>a+b,0)/frt.length):null;
    function fmtTime(s){if(s===null)return'—';if(s<3600)return Math.round(s/60)+'m';if(s<86400)return(s/3600).toFixed(1)+'h';return(s/86400).toFixed(1)+'d';}
    return{tot,cls,csat:csat.toFixed(1),frt:fmtTime(avgFRT),agents:rows.length};
  }

  const statsD=storeStats('Dinili');
  const statsM=storeStats('Montanello');
  if(!statsD||!statsM)return null;

  const combined={
    tot:statsD.tot+statsM.tot,
    cls:statsD.cls+statsM.cls,
    csat:(((parseFloat(statsD.csat)*kpiRows.filter(r=>r._store==='Dinili').length)+(parseFloat(statsM.csat)*kpiRows.filter(r=>r._store==='Montanello').length))/(kpiRows.length)).toFixed(1)
  };

  el.innerHTML=`
    <div class="section-title">Store comparison — ${activeMonth==='All'?'All months':activeMonth+' 2026'}</div>
    <div class="store-compare">
      ${['Dinili','Montanello'].map(s=>{
        const st=s==='Dinili'?statsD:statsM;
        const col=STORE_COLORS[s];
        const csatN=parseFloat(st.csat);
        const csatC=csatN>=4?'good':csatN>=3.5?'warn':'bad';
        return`<div class="store-card">
          <div class="store-card-header" style="background:${col}11">
            <div class="store-badge" style="background:${col}"></div>
            <div class="store-card-title" style="color:${col}">${s}</div>
          </div>
          <div class="store-card-body">
            <div class="store-stat"><div class="store-stat-label">Tickets replied</div><div class="store-stat-value">${st.tot.toLocaleString()}</div></div>
            <div class="store-stat"><div class="store-stat-label">Tickets closed</div><div class="store-stat-value">${st.cls.toLocaleString()}</div></div>
            <div class="store-stat"><div class="store-stat-label">Avg CSAT</div><div class="store-stat-value ${csatC}">${st.csat}</div></div>
            <div class="store-stat"><div class="store-stat-label">Avg first response</div><div class="store-stat-value">${st.frt}</div></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>

function mergeAgentRows(kpiRows){
  // Combine all rows for the same agent across stores into a single merged object
  return VA_AGENTS.map(a=>{
    const rows=kpiRows.filter(r=>r._a===a);
    if(!rows.length)return null;
    const totalReplied=rows.reduce((s,r)=>s+(parseInt(r['Tickets Replied'])||0),0);
    const totalClosed=rows.reduce((s,r)=>s+(parseInt(r['Closed Tickets'])||0),0);
    const totalMessages=rows.reduce((s,r)=>s+(parseInt(r['Messages Sent'])||0),0);
    // CSAT: weighted average by tickets replied
    const csatNum=rows.reduce((s,r)=>s+(parseFloat(r['Avg CSAT Score'])||0)*(parseInt(r['Tickets Replied'])||1),0);
    const csatDen=rows.reduce((s,r)=>s+(parseInt(r['Tickets Replied'])||1),0);
    const csat=csatDen>0?csatNum/csatDen:0;
    // Closed %: recalculate from combined totals
    const closedPct=totalReplied>0?(totalClosed/totalReplied*100):0;
    // One-touch %: weighted average
    const otNum=rows.reduce((s,r)=>s+(parseFloat(r['One Touch Tickets %'])||0)*(parseInt(r['Tickets Replied'])||1),0);
    const oneTouch=csatDen>0?otNum/csatDen:0;
    // First response: take the best (minimum) across stores
    const frts=rows.map(r=>parseTime(r['First Response Time'])).filter(v=>v!==Infinity);
    const bestFRT=frts.length?Math.min(...frts):Infinity;
    function fmtTime(s){if(s===Infinity)return'—';if(s<3600)return Math.round(s/60)+'m';if(s<86400)return(s/3600).toFixed(1)+'h';return(s/86400).toFixed(1)+'d';}
    return{
      _a:a,
      _merged:true,
      _storeCount:rows.length,
      totalReplied,totalClosed,csat,closedPct,oneTouch,
      frtRaw:bestFRT,frtFmt:fmtTime(bestFRT),
    };
  }).filter(Boolean);
}

function topPerformers(kpiRows,refRows){
  const wrap=document.createElement('div');
  const rawVaRows=kpiRows.filter(r=>VA_AGENTS.includes(r._a));
  if(!rawVaRows.length)return wrap;

  // When viewing all stores, merge each agent's data across stores before ranking
  const merged=activeStore==='All'?mergeAgentRows(rawVaRows):null;
  const usesMerged=merged&&merged.length>0;

  const refTotals={};VA_AGENTS.forEach(a=>{refTotals[a]=0;});
  const mRefs=activeMonth==='All'?refRows:refRows.filter(r=>r.mon===activeMonth);
  mRefs.filter(r=>VA_AGENTS.includes(r.ag)).forEach(r=>{refTotals[r.ag]=(refTotals[r.ag]||0)+r.val;});
  const hasRefData=Object.values(refTotals).some(v=>v>0);
  const refWinner=hasRefData?VA_AGENTS.reduce((a,b)=>refTotals[a]<=refTotals[b]?a:b):null;

  function scoreMerged(m){
    const csat=m.csat/5;
    const cp=m.closedPct/100;
    const ot=m.oneTouch/100;
    const frtS=m.frtRaw===Infinity?0:Math.max(0,1-(m.frtRaw/86400));
    return csat*0.4+cp*0.3+ot*0.2+frtS*0.1;
  }
  function scoreRaw(r){
    const csat=(parseFloat(r['Avg CSAT Score'])||0)/5;
    const cp=parseFloat(r['Closed Tickets %'])||0;
    const ot=parseFloat(r['One Touch Tickets %'])||0;
    const frt=parseTime(r['First Response Time']);
    const frtS=frt===Infinity?0:Math.max(0,1-(frt/86400));
    return csat*0.4+(cp/100)*0.3+(ot/100)*0.2+frtS*0.1;
  }

  let bestName,bestScore,csatName,csatVal,speedName,speedVal;

  if(usesMerged){
    const best=merged.reduce((b,m)=>scoreMerged(m)>scoreMerged(b)?m:b);
    bestName=best._a; bestScore=(scoreMerged(best)*100).toFixed(0);
    const csatTop=merged.reduce((b,m)=>m.csat>b.csat?m:b);
    csatName=csatTop._a; csatVal=csatTop.csat.toFixed(1);
    const speedTop=merged.filter(m=>m.frtRaw!==Infinity).reduce((b,m)=>m.frtRaw<b.frtRaw?m:b,merged.find(m=>m.frtRaw!==Infinity)||merged[0]);
    speedName=speedTop._a; speedVal=speedTop.frtFmt;
  } else {
    const best=rawVaRows.reduce((b,r)=>scoreRaw(r)>scoreRaw(b)?r:b);
    bestName=best._a; bestScore=(scoreRaw(best)*100).toFixed(0);
    const csatTop=rawVaRows.reduce((b,r)=>(parseFloat(r['Avg CSAT Score'])||0)>(parseFloat(b['Avg CSAT Score'])||0)?r:b);
    csatName=csatTop._a; csatVal=(parseFloat(csatTop['Avg CSAT Score'])||0).toFixed(1);
    const speedTop=rawVaRows.reduce((b,r)=>parseTime(r['First Response Time'])<parseTime(b['First Response Time'])?r:b);
    speedName=speedTop._a; speedVal=speedTop['First Response Time'];
  }

  const combinedLabel=usesMerged?' · combined across stores':'';

  wrap.className='highlights';
  wrap.innerHTML=`
    <div class="highlight-card hl-best"><div class="hl-icon">🏆</div><div class="hl-label">Best performer</div><div class="hl-name">${bestName}</div><div class="hl-stat">Score: ${bestScore}/100${combinedLabel}</div></div>
    <div class="highlight-card hl-csat"><div class="hl-icon">⭐</div><div class="hl-label">Best in CSAT</div><div class="hl-name">${csatName}</div><div class="hl-stat">Score: ${csatVal} / 5.0${combinedLabel}</div></div>
    ${hasRefData&&refWinner?`<div class="highlight-card hl-refund"><div class="hl-icon">💚</div><div class="hl-label">Lowest refunds</div><div class="hl-name">${refWinner}</div><div class="hl-stat">£${refTotals[refWinner].toFixed(0)} total value</div></div>`:''}
    <div class="highlight-card hl-speed"><div class="hl-icon">⚡</div><div class="hl-label">Fastest response</div><div class="hl-name">${speedName}</div><div class="hl-stat">First response: ${speedVal}${combinedLabel}</div></div>`;
  return wrap;
}

    </table></div></div>`;

  setTimeout(()=>{
    const tt=document.getElementById('trendTotal');
    const ta=document.getElementById('trendAgents');
    if(tt)CHARTS.trendTotal=new Chart(tt,{type:'line',data:{labels:ms,datasets:[{label:'Total',data:ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return+(d.total||0).toFixed(2);}),borderColor:'#378ADD',backgroundColor:'#378ADD22',fill:true,tension:0.3,pointRadius:5,pointHoverRadius:7,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888780',font:{size:12}},grid:{display:false}}}}});
    if(ta)CHARTS.trendAgents=new Chart(ta,{type:'bar',data:{labels:ms,datasets:shownAgents.map(a=>({label:a,data:ms.map(m=>{const d=monthTotals.find(x=>x.month===m);return+(d[a]||0).toFixed(2);}),backgroundColor:COLORS[a]+'99',borderColor:COLORS[a],borderWidth:1.5,borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:'#888780',font:{size:12}},grid:{display:false}},y:{stacked:true,ticks:{color:'#888780',font:{size:11},callback:v=>'£'+v},grid:{color:'rgba(128,128,128,0.1)'}}}}});
  },80);
  return el;
}

fetchAll();
</script>
